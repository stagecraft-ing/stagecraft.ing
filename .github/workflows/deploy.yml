name: Deploy to GitHub Pages

# Static build on every push to main, then publish to GitHub Pages.
# Pages is already enabled on this repo with build_type=workflow. The build
# runs `npm run build`, which bakes the registry payload from the family's
# public repos (build time only) and prerenders the React Router v7 site.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read the repo, write the Pages deployment, mint the OIDC
# token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-flight run finish rather than
# cancelling it (a half-published site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: npm ci

      - name: Build (bake registry + prerender)
        run: npm run build
        env:
          # Authenticate the build-time bake against the GitHub API for a higher
          # rate limit. The default token can read the family's public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
